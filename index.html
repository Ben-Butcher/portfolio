<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=terminal_2,toggle_off,toggle_on"
    />
    <link rel="stylesheet" href="style/styles.css" />
    <title>My Portfolio</title>
  </head>
  <body id="body">
    <!-- Header Section -->
    <header class="header">
      <div class="logo">
        <a href="index.html"
          ><span class="material-symbols-outlined"> terminal_2 </span></a
        >
      </div>

      <nav class="nav">
        <ul class="nav_items">
          <li class="item"><a href="#">Home</a></li>
          <li class="item"><a href="#">Projects</a></li>
          <li class="item"><a href="#">Skills</a></li>
          <li class="item"><a href="#">About Me</a></li>
        </ul>
      </nav>
      <div class="mode-toggle-container">
        <span id="light-mode" class="material-symbols-outlined">
          toggle_on
        </span>
        <span id="dark-mode" class="material-symbols-outlined hide">
          toggle_off
        </span>
      </div>
    </header>

    <main id="main" class="hero-page">
      <div class="page-navigation">
        <div class="page" name="home"><p>Home</p></div>
        <div class="page" name="projects"><p>Projects</p></div>
        <div class="page" name="skills"><p>Skills</p></div>
        <div class="page" name="about-me"><p>About Me</p></div>
      </div>
    </main>

    <script src="script/app.js"></script>

</html>
